# Server
server.port=8080
spring.application.name=food-planner

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Firebase
firebase.project-id=${FIREBASE_PROJECT_ID:food-planner-app}
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Gemini AI via Spring AI (Google GenAI / AI Studio)
# Set GEMINI_API_KEY env var to enable AI-powered menus; app falls back to samples without it.
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.max-output-tokens=8192

# Store integrations
stores.ica.enabled=${ICA_ENABLED:false}
stores.willys.enabled=${WILLYS_ENABLED:false}
stores.coop.enabled=${COOP_ENABLED:false}

# Offer page URLs (Playwright fetches these; override if a store changes its URL structure)
stores.ica.offers-url=https://www.ica.se/erbjudanden/
stores.willys.offers-url=https://www.willys.se/erbjudanden/
stores.coop.offers-url=https://www.coop.se/erbjudanden/
stores.hemkop.offers-url=https://www.hemkop.se/erbjudanden/
stores.lidl.offers-url=https://www.lidl.se/erbjudanden/

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.com.foodplanner=INFO
logging.level.org.springframework.security=WARN
