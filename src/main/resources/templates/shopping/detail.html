<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}"
      lang="en">
<head>
    <title th:text="${list.name}">Shopping List</title>
</head>
<body>
<main th:fragment="content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="max-w-2xl">
        <!-- Header -->
        <a href="/shopping" class="inline-flex items-center text-gray-500 hover:text-gray-700 mb-6 text-sm font-medium"
           th:text="#{shopping.detail.back}">← Back to Shopping Lists</a>

        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-900" th:text="${list.name}">Shopping List</h1>
                <p class="text-sm text-gray-500 mt-1"
                   th:text="${list.checkedCount + '/' + (list.items != null ? list.items.size() : 0)}">0/0</p>
            </div>
            <span th:if="${list.completed}" class="bg-green-100 text-green-700 px-3 py-1.5 rounded-full font-medium"
                  th:text="#{shopping.detail.alldone}">✓ All done!</span>
        </div>

        <!-- Progress bar -->
        <div class="w-full bg-gray-200 rounded-full h-3 mb-6">
            <div class="bg-primary-500 h-3 rounded-full transition-all duration-300"
                 th:style="'width: ' + ${list.items != null && list.items.size() > 0 ? (list.checkedCount * 100 / list.items.size()) : 0} + '%'"></div>
        </div>

        <!-- Sale items banner -->
        <div th:if="${list.saleItemCount > 0}"
             class="bg-green-50 border border-green-200 rounded-xl p-4 mb-6 flex items-center space-x-2">
            <span class="text-green-600">🏷️</span>
            <span class="text-green-700 text-sm font-medium"
                  th:text="${list.saleItemCount + ' ' + #{shopping.detail.onsale}}">Items on sale!</span>
        </div>

        <!-- Items grouped by category -->
        <div th:if="${list.items != null && !list.items.isEmpty()}"
             class="space-y-4" id="shoppingItems">

            <!-- Group by category -->
            <th:block th:each="category : ${ {'Produce', 'Meat', 'Dairy', 'Pantry', 'Frozen', 'Bakery', 'Beverages', 'Other'} }">
                <th:block th:with="categoryItems=${list.items.?[#this.category == category]}">
                    <div th:if="${categoryItems != null && !categoryItems.isEmpty()}">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2 px-1"
                            th:text="${#messages.msg('category.' + category.toLowerCase())}">Category</h3>
                        <div class="card divide-y divide-gray-100">
                            <div th:each="item : ${categoryItems}"
                                 class="flex items-center justify-between px-5 py-4 group"
                                 th:classappend="${item.checked ? 'opacity-60 bg-gray-50' : ''}">
                                <div class="flex items-center space-x-4 flex-1">
                                    <input type="checkbox"
                                           th:checked="${item.checked}"
                                           class="w-5 h-5 accent-primary-600 cursor-pointer flex-shrink-0"
                                           th:attr="data-item-id=${item.id}"
                                           onchange="toggleCheck(this, this.dataset.itemId)">
                                    <div class="flex-1">
                                        <span class="font-medium text-gray-800"
                                              th:classappend="${item.checked ? 'line-through text-gray-400' : ''}"
                                              th:text="${item.name}">Item</span>
                                        <span class="text-sm text-gray-500 ml-2"
                                              th:text="${item.amount + ' ' + (item.unit ?: '')}">200 g</span>
                                        <span th:if="${item.mealName != null}"
                                              class="text-xs text-gray-400 block mt-0.5"
                                              th:text="#{shopping.detail.formeal} + ' ' + ${item.mealName}">For: Pasta</span>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-2 ml-3">
                                    <span th:if="${item.onSale}"
                                          class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium flex items-center space-x-1">
                                        <span>🏷️</span>
                                        <span th:text="${item.storeName != null ? item.storeName : #{shopping.detail.onsale}}">On sale</span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </th:block>
            </th:block>

            <!-- Uncategorized items -->
            <th:block th:with="otherItems=${list.items.?[#this.category == null || #this.category.isEmpty()]}">
                <div th:if="${otherItems != null && !otherItems.isEmpty()}">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2 px-1" th:text="#{category.other}">Other</h3>
                    <div class="card divide-y divide-gray-100">
                        <div th:each="item : ${otherItems}"
                             class="flex items-center justify-between px-5 py-4"
                             th:classappend="${item.checked ? 'opacity-60 bg-gray-50' : ''}">
                            <div class="flex items-center space-x-4 flex-1">
                                <input type="checkbox"
                                       th:checked="${item.checked}"
                                       class="w-5 h-5 accent-primary-600 cursor-pointer"
                                       th:attr="data-item-id=${item.id}"
                                       onchange="toggleCheck(this, this.dataset.itemId)">
                                <span class="font-medium text-gray-800"
                                      th:classappend="${item.checked ? 'line-through text-gray-400' : ''}"
                                      th:text="${item.name + ' – ' + item.amount + ' ' + (item.unit ?: '')}">Item</span>
                            </div>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>

        <div th:if="${list.items == null || list.items.isEmpty()}"
             class="card p-8 text-center text-gray-500">
            <div class="text-3xl mb-2">📋</div>
            <p th:text="#{shopping.detail.noitems}">No items in this list</p>
        </div>
    </div>

    <script th:inline="javascript">
        const listId = /*[[${list.id}]]*/ '';
        const csrfToken = /*[[${_csrf.token}]]*/ '';
        const csrfHeader = /*[[${_csrf.headerName}]]*/ '';

        function toggleCheck(checkbox, itemId) {
            const checked = checkbox.checked;
            fetch(`/shopping/${listId}/items/${itemId}/check`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [csrfHeader]: csrfToken
                },
                body: `checked=${checked}`
            })
            .then(r => r.json())
            .then(data => {
                // Update visual state
                const row = checkbox.closest('div.flex');
                if (row) {
                    row.parentElement.classList.toggle('opacity-60', checked);
                    row.parentElement.classList.toggle('bg-gray-50', checked);
                    const text = row.querySelector('span.font-medium');
                    if (text) {
                        text.classList.toggle('line-through', checked);
                        text.classList.toggle('text-gray-400', checked);
                    }
                }
            })
            .catch(e => console.error(e));
        }
    </script>
</main>
</body>
</html>
