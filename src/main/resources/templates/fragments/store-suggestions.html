<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<th:block th:fragment="results">
    <div th:if="${results.isEmpty()}" class="px-4 py-3">
        <p class="text-sm text-gray-400 italic">No matching stores found.</p>
        <div th:if="${q != null and !#strings.isEmpty(q)}" class="mt-3 pt-3 border-t border-gray-100">
            <p class="text-xs text-gray-500 mb-2">Add "<span th:text="${q}" class="font-medium text-gray-700">name</span>" as a custom store:</p>
            <div class="flex gap-2 items-center">
                <select id="newStoreChain"
                        class="text-xs border border-gray-300 rounded-lg px-2 py-1.5 focus:ring-1 focus:ring-primary-500 outline-none bg-white">
                    <option value="ica">ICA</option>
                    <option value="willys">Willys</option>
                    <option value="coop">Coop</option>
                    <option value="hemkop">Hemköp</option>
                    <option value="lidl">Lidl</option>
                    <option value="mathem">Mathem</option>
                    <option value="other">Other</option>
                </select>
                <button type="button"
                        th:data-store-name="${q}"
                        onclick="addCustomStoreEl(this)"
                        class="text-xs bg-primary-600 text-white px-3 py-1.5 rounded-lg hover:bg-primary-700 transition-colors font-medium">
                    ➕ Add store
                </button>
            </div>
        </div>
    </div>
    <div th:each="store : ${results}"
         th:data-store-id="${store.id}"
         th:data-store-name="${store.name}"
         th:data-store-chain="${store.chain}"
         onclick="addStoreEl(this)"
         class="px-4 py-3 hover:bg-primary-50 cursor-pointer border-b border-gray-100 last:border-0 flex items-center justify-between group">
        <span class="font-medium text-gray-800 group-hover:text-primary-700"
              th:text="${store.name}">Store Name</span>
        <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 uppercase"
              th:text="${store.chain}">chain</span>
    </div>
</th:block>
</body>
</html>
