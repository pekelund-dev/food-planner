<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}"
      lang="en">
<head>
    <title>Meals</title>
</head>
<body>
<main th:fragment="content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Meals</h1>
            <p class="text-gray-500 mt-1">Manage your meal library</p>
        </div>
        <div class="flex gap-3">
            <a href="/recipes" class="btn-secondary">← Back to Recipes</a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(meals)}" class="card p-12 text-center">
        <div class="text-5xl mb-4">🍽️</div>
        <h2 class="text-xl font-bold text-gray-700 mb-2">No meals yet</h2>
        <p class="text-gray-500">Meals are created automatically when you generate recipes.</p>
    </div>

    <div th:if="${!#lists.isEmpty(meals)}"
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="meal : ${meals}" class="card p-6">
            <div class="flex items-start justify-between mb-3">
                <h3 class="font-bold text-gray-800 text-lg" th:text="${meal.name}">Meal Name</h3>
                <span class="text-xs bg-purple-100 text-purple-700 px-2 py-1 rounded-full ml-2"
                      th:text="${meal.mealType ?: 'DINNER'}">DINNER</span>
            </div>
            <p class="text-sm text-gray-600 mb-3" th:text="${meal.description}">Description</p>
            <div th:if="${meal.averageRating > 0}" class="flex items-center space-x-1 text-sm">
                <span>⭐</span>
                <span class="font-medium text-gray-700" th:text="${#numbers.formatDecimal(meal.averageRating, 1, 1) + ' (' + meal.ratingCount + ' ratings)'}">4.5 (3 ratings)</span>
            </div>
            <div th:if="${meal.tags != null && !meal.tags.isEmpty()}" class="flex flex-wrap gap-1 mt-3">
                <span th:each="tag : ${meal.tags}"
                      class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full"
                      th:text="${tag}">tag</span>
            </div>
        </div>
    </div>
</main>
</body>
</html>
