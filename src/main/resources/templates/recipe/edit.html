<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}"
      lang="en">
<head>
    <title th:text="${recipe.id != null ? 'Edit Recipe' : 'New Recipe'}">Recipe</title>
</head>
<body>
<main th:fragment="content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="max-w-3xl">
        <a href="/recipes" class="inline-flex items-center text-gray-500 hover:text-gray-700 mb-6 text-sm font-medium">
            ← Back to Recipes
        </a>

        <h1 class="text-3xl font-bold text-gray-900 mb-8"
            th:text="${recipe.id != null ? 'Edit Recipe' : 'New Recipe'}">Recipe</h1>

        <form action="/recipes" method="post" class="space-y-6">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="id" th:value="${recipe.id}"/>

            <div class="card p-6 space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Recipe Name *</label>
                    <input type="text" name="name" required th:value="${recipe.name}"
                           class="w-full border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea name="description" rows="3"
                              th:text="${recipe.description}"
                              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-primary-500 resize-none"></textarea>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Servings</label>
                        <input type="number" name="servings" min="1" th:value="${recipe.servings ?: 2}"
                               class="w-full border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Prep (min)</label>
                        <input type="number" name="prepTimeMinutes" min="0" th:value="${recipe.prepTimeMinutes ?: 15}"
                               class="w-full border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Cook (min)</label>
                        <input type="number" name="cookTimeMinutes" min="0" th:value="${recipe.cookTimeMinutes ?: 30}"
                               class="w-full border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Difficulty</label>
                        <select name="difficulty"
                                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-primary-500">
                            <option value="EASY" th:selected="${recipe.difficulty?.name() == 'EASY'}">Easy</option>
                            <option value="MEDIUM" th:selected="${recipe.difficulty?.name() == 'MEDIUM'}">Medium</option>
                            <option value="HARD" th:selected="${recipe.difficulty?.name() == 'HARD'}">Hard</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex justify-end space-x-3">
                <a href="/recipes" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">Save Recipe</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
